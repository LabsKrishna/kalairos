name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # KAL-100: cross-platform correctness for the smoke/unit suite.
    # Perf gates (poisoning, latency, agent-memory bench) stay on ubuntu-latest
    # only — thresholds are Linux-calibrated; cross-OS perf would be flaky.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      # Plain test runs on every matrix combo EXCEPT node-22, where the
      # coverage-instrumented variant runs in its place (same suite, plus
      # c8 instrumentation). Coverage is only uploaded from ubuntu-22 —
      # the canonical platform — to avoid duplicate uploads from the
      # macos/windows runners on the same commit.
      - run: npm test
        if: matrix.node-version != 22
      - name: Test with coverage
        run: npm run test:coverage
        if: matrix.node-version == 22
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
      # Agent-memory benchmark gates only on ubuntu-22 — perf thresholds
      # are Linux-calibrated, and we don't need the same numbers from
      # every matrix combo.
      - if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: npm run bench

  poisoning:
    # CLAUDE.md §17: poisoning benchmark is a CI gate. The runner already
    # exits non-zero when any fixture is compromised; running it here makes
    # the gate enforceable.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run bench:poisoning

  latency:
    # CLAUDE.md §17: named latency budgets are CI-gated. Threshold is
    # calibrated for shared GitHub runners (slower than M-series local dev);
    # see BENCH.md for the per-scale numbers and how to amend the budget.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run bench:latency
        env:
          KALAIROS_LATENCY_BUDGET_ENFORCE: "1"
          KALAIROS_LATENCY_BUDGET_P95_MS_AT_1K: "150"
