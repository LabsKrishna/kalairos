name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # KAL-100: cross-platform correctness for the smoke/unit suite.
    # Perf gates (poisoning, latency, agent-memory bench) stay on ubuntu-latest
    # only — thresholds are Linux-calibrated; cross-OS perf would be flaky.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Node 18 dropped (EOL Apr 2025): better-sqlite3 v12 — the hybrid-index
        # engine — supports 20+ only and ships no 18 prebuilds, so 18 could
        # only ever install via fragile source builds. engines: >=20 matches.
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      # Plain test runs on every matrix combo EXCEPT node-22, where the
      # coverage-instrumented variant runs in its place (same suite, plus
      # c8 instrumentation). Coverage is only uploaded from ubuntu-22 —
      # the canonical platform — to avoid duplicate uploads from the
      # macos/windows runners on the same commit.
      - run: npm test
        if: matrix.node-version != 22
      - name: Test with coverage
        run: npm run test:coverage
        if: matrix.node-version == 22
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
      # Agent-memory benchmark gates only on ubuntu-22 — perf thresholds
      # are Linux-calibrated, and we don't need the same numbers from
      # every matrix combo.
      - if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: npm run bench

  poisoning:
    # CLAUDE.md §17: poisoning benchmark is a CI gate. The runner already
    # exits non-zero when any fixture is compromised; running it here makes
    # the gate enforceable.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run bench:poisoning

  latency:
    # CLAUDE.md §17: named latency budgets are CI-gated. Threshold is
    # calibrated for shared GitHub runners (slower than M-series local dev);
    # see BENCH.md for the per-scale numbers and how to amend the budget.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run bench:latency
        env:
          KALAIROS_LATENCY_BUDGET_ENFORCE: "1"
          KALAIROS_LATENCY_BUDGET_P95_MS_AT_1K: "150"

  python:
    # Phase 0 of the agent-platform epic: Python kernel scaffolding lives in
    # python/. Smoke tests confirm the package imports and that the v1.7
    # schema constants stay in sync with the JS source of truth
    # (store/sqlite-index.js). ubuntu-only for now — full cross-OS matrix
    # lands in Phase 1 when there's actual file I/O behavior to exercise.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest -v
      # CLAUDE.md §17: observability completeness + cross-agent trace
      # coverage are platform benchmarks that gate every PR. pytest
      # already asserts the floors; this prints the table in the logs
      # and makes the gate a named, visible step. See BENCH.md.
      - name: Observability benchmark (§17 platform gate)
        run: python bench/observability.py --check

  services:
    # Node-side microservices that talk to the Python LedgerServer.
    # Currently just dep-graph-builder (Phase 3.3's Node counterpart);
    # future services run under the same job by adding to test:services.
    # ubuntu + node 22 only — node:test was stabilized in 20, and the
    # services are pure logic with no platform-specific I/O.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:services
